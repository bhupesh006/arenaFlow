name: arena_flow
description: A cross-platform mobile app to improve physical event experience at massive sporting venues.
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  # State Management
  flutter_bloc: ^8.1.3
  equatable: ^2.0.5
  # Routing
  go_router: ^12.1.1
  # UI & Maps
  flutter_map: ^6.1.0
  latlong2: ^0.9.0
  # Firebase Services & Google AI
  firebase_core: ^2.24.2
  firebase_auth: ^4.15.3
  cloud_firestore: ^4.13.6
  firebase_messaging: ^14.7.19
  firebase_app_check: ^0.2.1+3
  google_generative_ai: ^0.2.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^2.0.0

flutter:
  uses-material-design: true
